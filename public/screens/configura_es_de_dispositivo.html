<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Aura Home - Device Settings</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface": "#fcf9f8",
                        "tertiary-container": "#737576",
                        "on-surface": "#1c1b1b",
                        "on-secondary-fixed": "#261901",
                        "secondary-fixed-dim": "#dcc399",
                        "on-tertiary": "#ffffff",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed-variant": "#6d3a00",
                        "inverse-surface": "#313030",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed": "#ffdcc2",
                        "secondary": "#6e5c39",
                        "inverse-on-surface": "#f3f0ef",
                        "tertiary-fixed": "#e2e2e4",
                        "primary-fixed-dim": "#ffb77b",
                        "outline": "#857467",
                        "surface-container-low": "#f6f3f2",
                        "on-error": "#ffffff",
                        "surface-dim": "#dcd9d9",
                        "inverse-primary": "#ffb77b",
                        "background": "#fcf9f8",
                        "outline-variant": "#d8c3b4",
                        "primary-container": "#a76526",
                        "tertiary": "#5a5c5e",
                        "secondary-fixed": "#f9dfb3",
                        "surface-variant": "#e5e2e1",
                        "surface-container": "#f0eded",
                        "surface-bright": "#fcf9f8",
                        "tertiary-fixed-dim": "#c6c6c8",
                        "surface-container-high": "#eae7e7",
                        "secondary-container": "#f9dfb3",
                        "on-secondary-container": "#74623f",
                        "surface-tint": "#8c4f10",
                        "error": "#ba1a1a",
                        "primary": "#894d0d",
                        "on-tertiary-fixed": "#1a1c1d",
                        "on-tertiary-container": "#fcfcfe",
                        "on-primary-container": "#fffbff",
                        "on-tertiary-fixed-variant": "#454749",
                        "on-error-container": "#93000a",
                        "surface-container-highest": "#e5e2e1",
                        "on-secondary-fixed-variant": "#554424",
                        "on-primary-fixed": "#2e1500",
                        "error-container": "#ffdad6",
                        "on-surface-variant": "#524439",
                        "on-primary": "#ffffff",
                        "on-background": "#1c1b1b"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "unit": "8px",
                        "section-gap": "64px",
                        "container-padding": "40px",
                        "gutter": "24px",
                        "stack-sm": "8px",
                        "stack-lg": "32px",
                        "stack-md": "16px"
                    },
                    "fontFamily": {
                        "stat-lg": ["Inter"],
                        "display-lg": ["Inter"],
                        "label-caps": ["Inter"],
                        "body-base": ["Inter"],
                        "headline-md": ["Inter"]
                    },
                    "fontSize": {
                        "stat-lg": ["32px", { "lineHeight": "1.0", "letterSpacing": "-0.01em", "fontWeight": "300" }],
                        "display-lg": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "300" }],
                        "label-caps": ["12px", { "lineHeight": "1.2", "letterSpacing": "0.1em", "fontWeight": "600" }],
                        "body-base": ["16px", { "lineHeight": "1.6", "letterSpacing": "0em", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background min-h-screen text-on-background selection:bg-primary-container selection:text-on-primary-container font-sans antialiased">
<!-- TopAppBar (From JSON - Execution Strict adherence) -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-white/80 dark:bg-stone-900/80 backdrop-blur-xl docked full-width top-0 border-b border-stone-200/50 dark:border-stone-800/50 shadow-[0_4px_30px_rgba(184,115,51,0.05)] transition-all">
<!-- Leading Icon -->
<button class="text-stone-400 dark:text-stone-500 hover:bg-orange-50/50 dark:hover:bg-stone-800/50 transition-colors scale-95 duration-300 ease-out p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<!-- Headline -->
<div class="font-['Inter'] tracking-widest uppercase text-xs font-semibold text-orange-700 dark:text-orange-500 tracking-[0.2em]">
            AURA RESIDENCE
        </div>
<!-- Trailing Avatar -->
<button class="text-stone-400 dark:text-stone-500 hover:bg-orange-50/50 dark:hover:bg-stone-800/50 transition-colors scale-95 duration-300 ease-out w-8 h-8 rounded-full overflow-hidden border border-orange-200/20 flex items-center justify-center bg-surface-variant">
<span class="material-symbols-outlined text-sm" data-icon="person">person</span>
</button>
</header>
<!-- Main Canvas -->
<main class="pt-[104px] pb-container-padding px-6 md:px-container-padding max-w-7xl mx-auto">
<!-- Header Section -->
<div class="flex flex-col gap-stack-sm mb-section-gap">
<div class="flex items-center gap-2">
<span class="font-label-caps text-label-caps text-tertiary uppercase">Living Room</span>
<span class="text-tertiary-fixed-dim text-xs">•</span>
<span class="font-label-caps text-label-caps text-primary uppercase">Device Settings</span>
</div>
<div class="flex flex-col md:flex-row md:items-end justify-between gap-gutter">
<h1 class="font-display-lg text-display-lg text-on-surface">Main Lighting</h1>
<div class="flex items-center gap-3">
<span class="relative flex h-3 w-3">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary opacity-75"></span>
<span class="relative inline-flex rounded-full h-3 w-3 bg-primary"></span>
</span>
<span class="font-body-base text-body-base text-secondary">Active • 80%</span>
</div>
</div>
</div>
<!-- Controls Bento Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-12 gap-gutter">
<!-- Brightness Card (Spans wide) -->
<div class="lg:col-span-8 bg-gradient-to-b from-white to-surface-container-low ring-1 ring-inset ring-outline-variant/30 rounded-xl p-8 shadow-[0_8px_32px_rgba(137,77,13,0.03)] flex flex-col justify-center min-h-[160px]">
<div class="flex items-center justify-between mb-stack-lg">
<h2 class="font-label-caps text-label-caps text-on-surface-variant uppercase">Brightness</h2>
<span class="material-symbols-outlined text-tertiary-container" data-icon="lightbulb">lightbulb</span>
</div>
<div class="relative w-full flex items-center py-4">
<!-- Ultra thin track -->
<div class="h-[2px] bg-surface-variant w-full rounded-full relative">
<!-- Fill -->
<div class="absolute left-0 top-0 h-full bg-primary rounded-full" style="width: 80%;"></div>
<!-- Handle -->
<div class="absolute top-1/2 -translate-y-1/2 w-6 h-6 bg-primary rounded-full shadow-md border-2 border-white cursor-pointer hover:scale-110 transition-transform" style="left: 80%;"></div>
</div>
</div>
</div>
<!-- Power Toggle Card (Spans narrow) -->
<div class="lg:col-span-4 bg-gradient-to-b from-white to-surface-container-low ring-1 ring-inset ring-outline-variant/30 rounded-xl p-8 shadow-[0_8px_32px_rgba(137,77,13,0.03)] flex flex-col justify-between min-h-[160px]">
<div class="flex items-center justify-between">
<h2 class="font-label-caps text-label-caps text-on-surface-variant uppercase">Power</h2>
<span class="material-symbols-outlined text-tertiary-container" data-icon="power_settings_new">power_settings_new</span>
</div>
<div class="flex items-center justify-between mt-auto pt-4 border-t border-surface-variant/50">
<span class="font-headline-md text-headline-md text-on-surface">On</span>
<!-- Minimalist Toggle -->
<button class="w-12 h-6 bg-primary rounded-full relative transition-colors focus:outline-none focus:ring-2 focus:ring-primary/50 focus:ring-offset-2">
<span class="w-5 h-5 bg-white rounded-full absolute right-0.5 top-0.5 shadow-sm transition-transform"></span>
</button>
</div>
</div>
<!-- Color Temperature Card -->
<div class="lg:col-span-8 bg-gradient-to-b from-white to-surface-container-low ring-1 ring-inset ring-outline-variant/30 rounded-xl p-8 shadow-[0_8px_32px_rgba(137,77,13,0.03)] flex flex-col justify-center min-h-[160px]">
<div class="flex items-center justify-between mb-stack-lg">
<h2 class="font-label-caps text-label-caps text-on-surface-variant uppercase">Color Temperature</h2>
<span class="font-label-caps text-label-caps text-secondary uppercase">4200K</span>
</div>
<div class="relative w-full flex items-center py-4">
<!-- Gradient Track -->
<div class="h-[2px] w-full rounded-full relative bg-gradient-to-r from-[#ffcf85] via-surface-variant to-[#a6d1ff]">
<!-- Handle -->
<div class="absolute top-1/2 -translate-y-1/2 w-6 h-6 bg-white rounded-full shadow-md border border-outline-variant cursor-pointer hover:scale-110 transition-transform" style="left: 45%;"></div>
</div>
</div>
</div>
<!-- Schedule Card -->
<div class="lg:col-span-4 bg-gradient-to-b from-white to-surface-container-low ring-1 ring-inset ring-outline-variant/30 rounded-xl p-8 shadow-[0_8px_32px_rgba(137,77,13,0.03)] flex flex-col min-h-[160px]">
<div class="flex items-center justify-between mb-stack-md">
<h2 class="font-label-caps text-label-caps text-on-surface-variant uppercase">Schedule</h2>
<span class="material-symbols-outlined text-tertiary-container" data-icon="schedule">schedule</span>
</div>
<div class="flex flex-col gap-4 mt-auto">
<div class="flex items-center justify-between p-4 bg-surface rounded-lg ring-1 ring-inset ring-surface-variant/50">
<div class="flex flex-col">
<span class="font-body-base text-body-base text-on-surface">Evening Ambiance</span>
<span class="font-label-caps text-label-caps text-tertiary-container uppercase mt-1">6:00 PM - 11:00 PM</span>
</div>
<button class="w-10 h-5 bg-primary rounded-full relative transition-colors">
<span class="w-4 h-4 bg-white rounded-full absolute right-0.5 top-0.5 shadow-sm transition-transform"></span>
</button>
</div>
<!-- Add New Ghost Button -->
<button class="w-full flex items-center justify-center gap-2 py-3 border border-outline/30 rounded-lg text-primary hover:bg-primary/5 transition-colors group">
<span class="material-symbols-outlined text-sm group-hover:scale-110 transition-transform" data-icon="add">add</span>
<span class="font-label-caps text-label-caps uppercase">Add Routine</span>
</button>
</div>
</div>
<!-- Firmware Info Card -->
<div class="lg:col-span-12 bg-white/40 backdrop-blur-md ring-1 ring-inset ring-outline-variant/20 rounded-xl p-8 flex flex-col md:flex-row items-start md:items-center justify-between gap-6 shadow-[0_4px_24px_rgba(0,0,0,0.02)]">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center ring-1 ring-outline-variant/30">
<span class="material-symbols-outlined text-secondary" data-icon="router">router</span>
</div>
<div class="flex flex-col">
<h3 class="font-body-base text-body-base text-on-surface font-medium">Aura Connect Bridge</h3>
<p class="font-label-caps text-label-caps text-tertiary-container uppercase mt-1">Firmware v2.4.1 (Up to date)</p>
</div>
</div>
<button class="px-6 py-3 border border-outline text-primary rounded-full hover:bg-primary/5 transition-colors font-label-caps text-label-caps uppercase tracking-widest whitespace-nowrap">
                    Check for Updates
                </button>
</div>
</div>
</main>
</body></html>
